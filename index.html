<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #1a1a1a;
    }
    h1 { margin-bottom: 0.5rem; }
    p.subtitle { color: #666; margin-bottom: 2rem; }
    .apps { display: grid; gap: 1rem; }
    .app-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .app-card:hover {
      border-color: #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .app-card h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    .app-card p { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Mini Apps</h1>
  <p class="subtitle">A collection of small apps and experiments.</p>
  <div class="apps">
    <a class="app-card" href="./annotated-autoresearch/">
      <h2>Annotated AutoResearch</h2>
      <p>An artifact viewer for auto-research results.</p>
    </a>
  </div>
</body>
</html>
